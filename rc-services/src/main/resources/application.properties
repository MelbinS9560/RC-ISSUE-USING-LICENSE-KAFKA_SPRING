spring.application.name=rc-services
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/rc_db
spring.datasource.username=root
spring.datasource.password=Melbin@123
spring.jpa.hibernate.ddl-auto=update

# Kafka Configuration
spring.kafka.consumer.bootstrap-servers=localhost:9092

# Change this to a fresh name (like v10) to force Kafka to start fresh
spring.kafka.consumer.group-id=rc-service-v3

# 'latest' means it ignores old messages and only listens for NEW ones sent after the app starts
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer