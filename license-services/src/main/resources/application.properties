spring.application.name=license-services
spring.datasource.url=jdbc:mysql://localhost:3306/license_db
spring.datasource.username=root
spring.datasource.password=Melbin@123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.port=8085



management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


# Kafka Connection
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.client-id=Producer

# Serialization
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Reliability
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# App Specific
app.kafka.topic-name=test-topic

spring.kafka.producer.properties.spring.json.add.type.headers=false

